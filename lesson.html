<!DOCTYPE html>
<html lang="en">

<head>

<script>
if(localStorage.getItem("courseAccess") !== "granted"){
window.location.href="index.html"
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lesson</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#020617;
color:white;
padding:20px;
padding-bottom:80px;
}

/* BACK BUTTON */

.back{
margin-bottom:20px;
font-size:14px;
opacity:0.7;
cursor:pointer;
}

/* VIDEO PLAYER */

.videoContainer{
width:100%;
max-width:900px;
margin:auto;
aspect-ratio:9/16;
background:black;
border-radius:18px;
overflow:hidden;
margin-bottom:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

iframe{
width:100%;
height:100%;
border:none;
display:block;
}

/* LESSON INFO */

.lessonTitle{
font-size:20px;
font-weight:700;
margin-bottom:10px;
}

.lessonDesc{
font-size:14px;
opacity:0.7;
margin-bottom:25px;
}

/* NAV BAR */

.lessonNav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0b0b0f;
border-top:1px solid #1f2937;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
z-index:999;
}

.lessonNav button{
flex:1;
margin:0 5px;
border:none;
padding:10px 12px;
border-radius:10px;
font-size:13px;
font-weight:600;
color:white;
}

.prevBtn{
background:#1f2937;
}

.doneBtn{
background:#16a34a;
}

.nextBtn{
background:#2563eb;
}

.lessonNav button:active{
transform:scale(.96);
}

</style>

</head>

<body>

<div class="back" onclick="goBack()">
← Back to Dashboard
</div>

<div class="videoContainer">
<iframe id="videoPlayer" allowfullscreen></iframe>
</div>

<div class="lessonTitle" id="lessonTitle">
Lesson Title
</div>

<div class="lessonDesc" id="lessonDesc">
Lesson description
</div>

<div class="lessonNav">

<button class="prevBtn" onclick="previousLesson()">
← Previous
</button>

<button class="doneBtn" onclick="markDone()">
✓ Mark Done
</button>

<button class="nextBtn" onclick="nextLesson()">
Next →
</button>

</div>

<script>

/* LESSON DATA */

const lessons = {

1:{
title:"Setting Up",
desc:"Learn how to set up the tools needed for AI flyer design.",
video:"https://drive.google.com/file/d/VIDEO_ID_1/preview"
},

2:{
title:"Prompt Direct System",
desc:"Learn how to write powerful prompts for AI flyer generation.",
video:"https://drive.google.com/file/d/VIDEO_ID_2/preview"
},

3:{
title:"Reverse Prompt System",
desc:"Use reverse prompting to recreate designs with AI.",
video:"https://drive.google.com/file/d/VIDEO_ID_3/preview"
},

4:{
title:"Working With Custom Images",
desc:"Learn how to integrate custom images into AI flyers.",
video:"https://drive.google.com/file/d/VIDEO_ID_4/preview"
},

5:{
title:"Working With Arena AI",
desc:"Explore Arena AI for advanced flyer generation.",
video:"https://drive.google.com/file/d/VIDEO_ID_5/preview"
},

6:{
title:"How To Monetize This Skill",
desc:"Learn how to make money designing flyers with AI.",
video:"https://drive.google.com/file/d/VIDEO_ID_6/preview"
}

}

/* LOAD LESSON */

let lessonNumber = parseInt(localStorage.getItem("currentLesson")) || 1

if(!lessons[lessonNumber]){
lessonNumber = 1
}

let lesson = lessons[lessonNumber]

document.getElementById("lessonTitle").innerText = lesson.title
document.getElementById("lessonDesc").innerText = lesson.desc
document.getElementById("videoPlayer").src = lesson.video


/* BACK */

function goBack(){
window.location.href="dashboard.html"
}


/* MARK LESSON COMPLETE */

function markDone(){

let completed = JSON.parse(localStorage.getItem("completedLessons")) || []

if(!completed.includes(lessonNumber)){
completed.push(lessonNumber)
}

localStorage.setItem("completedLessons",JSON.stringify(completed))

alert("Lesson completed!")

}


/* NEXT LESSON */

function nextLesson(){

let next = lessonNumber + 1

if(next > 6){
alert("You finished the course!")
return
}

localStorage.setItem("currentLesson",next)

window.location.href="lesson.html"

}


/* PREVIOUS LESSON */

function previousLesson(){

let prev = lessonNumber - 1

if(prev < 1){
return
}

localStorage.setItem("currentLesson",prev)

window.location.href="lesson.html"

}

</script>

</body>
</html>
