<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Flyer Design Mastery</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- DEVICE FINGERPRINT -->
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:linear-gradient(180deg,#020617,#0f172a);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
width:100%;
max-width:420px;
padding:20px;
}

.card{
background:#0f172a;
border-radius:22px;
padding:40px 28px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.05);
animation:fadeUp 0.8s ease;
}

.logo{
font-size:24px;
font-weight:800;
text-align:center;
margin-bottom:8px;
}

.subtitle{
text-align:center;
font-size:14px;
opacity:0.7;
margin-bottom:30px;
}

.inputBox{
margin-bottom:20px;
}

input{
width:100%;
padding:16px;
border-radius:12px;
border:none;
background:#020617;
color:white;
font-size:16px;
letter-spacing:1px;
}

input:focus{
outline:2px solid #2563eb;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.02);
background:#1d4ed8;
}

.error{
margin-top:15px;
font-size:13px;
text-align:center;
color:#ef4444;
display:none;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
AI Flyer Design Mastery
</div>

<div class="subtitle">
Enter your access code to unlock the course
</div>

<div class="inputBox">

<input 
id="codeInput"
placeholder="FLYER-XXXXXX"
/>

</div>

<button onclick="unlockCourse()">
Unlock Course
</button>

<div class="error" id="error">
Invalid access code
</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* AUTO LOGIN */

if(localStorage.getItem("courseAccess") === "granted"){
window.location.href="dashboard.html"
}

/* DEVICE FINGERPRINT */

async function getDeviceId(){

const fp = await FingerprintJS.load()
const result = await fp.get()

return result.visitorId

}

/* UNLOCK COURSE */

window.unlockCourse = async function(){

const code = document.getElementById("codeInput").value.trim().toUpperCase()
const error = document.getElementById("error")

error.style.display="none"

if(!code){

error.innerText="Please enter your access code"
error.style.display="block"
return

}

try{

const deviceId = await getDeviceId()

const ref = doc(db,"accessCodes",code)
const snapshot = await getDoc(ref)

if(!snapshot.exists()){

error.innerText="Invalid access code"
error.style.display="block"
return

}

const data = snapshot.data()

if(!data.used){

await updateDoc(ref,{
used:true,
deviceId:deviceId,
activatedAt:new Date().toISOString()
})

/* SAVE ACCESS */

localStorage.setItem("courseAccess","granted")
localStorage.setItem("userCode",code)
localStorage.setItem("deviceId",deviceId)

window.location.href="dashboard.html"

}

else{

if(data.deviceId === deviceId){

localStorage.setItem("courseAccess","granted")
localStorage.setItem("userCode",code)
localStorage.setItem("deviceId",deviceId)

window.location.href="dashboard.html"

}

else{

error.innerText="This code is already activated on another device"
error.style.display="block"

}

}

}

catch(err){

error.innerText="Connection error. Try again."
error.style.display="block"
console.error(err)

}

}

</script>

</body>
</html>
