<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',system-ui;
}

body{
background:linear-gradient(180deg,#020617,#0f172a);
color:white;
padding:30px;
}

/* LOGIN SCREEN */

.loginScreen{
position:fixed;
inset:0;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.loginCard{
background:#0f172a;
padding:40px;
border-radius:16px;
width:320px;
text-align:center;
border:1px solid rgba(255,255,255,0.06);
}

.loginTitle{
font-size:22px;
font-weight:700;
margin-bottom:6px;
}

.loginSub{
opacity:.6;
font-size:13px;
margin-bottom:20px;
}

.loginCard input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:12px;
background:#020617;
color:white;
}

.loginError{
display:none;
color:#ef4444;
font-size:13px;
margin-top:8px;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
}

.title{
font-size:30px;
font-weight:700;
margin-bottom:25px;
}

/* ANALYTICS */

.analytics{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
margin-bottom:30px;
}

.statCard{
background:#0f172a;
padding:22px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.05);
}

.statTitle{
font-size:13px;
opacity:.6;
margin-bottom:8px;
}

.statNumber{
font-size:28px;
font-weight:700;
}

/* CARDS */

.card{
background:#0f172a;
padding:24px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.05);
margin-bottom:25px;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:12px;
margin-bottom:14px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:14px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.danger{
background:#dc2626;
}

.danger:hover{
background:#b91c1c;
}

/* GENERATED CODES */

.codeBox{
margin-top:15px;
background:#020617;
padding:16px;
border-radius:10px;
font-size:14px;
letter-spacing:1px;
max-height:140px;
overflow:auto;
}

/* TABLE */

.tableWrap{
margin-top:18px;
overflow:auto;
max-height:420px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.05);
}

table{
width:100%;
border-collapse:collapse;
min-width:650px;
}

thead{
background:#020617;
position:sticky;
top:0;
}

th{
text-align:left;
font-size:12px;
opacity:.6;
padding:14px;
}

td{
padding:14px;
font-size:14px;
border-bottom:1px solid rgba(255,255,255,0.04);
}

.codeCell{
color:#60a5fa;
font-weight:600;
cursor:pointer;
}

.codeCell:hover{
text-decoration:underline;
}

.used{
color:#22c55e;
font-weight:600;
}

.unused{
color:#f59e0b;
font-weight:600;
}

/* PAGINATION */

.pagination{
display:none;
justify-content:center;
gap:12px;
margin-top:15px;
}

/* TOAST */

.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
padding:10px 18px;
border-radius:30px;
font-size:14px;
opacity:0;
transition:.3s;
}

.toast.show{
opacity:1;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="loginScreen" id="loginScreen">
<div class="loginCard">
<div class="loginTitle">Admin Access</div>
<div class="loginSub">Enter password</div>

<input type="password" id="adminPass" placeholder="Password">

<button onclick="loginAdmin()">Unlock</button>

<div class="loginError" id="loginError">Wrong password</div>
</div>
</div>

<div class="container">

<div class="title">Admin Dashboard</div>

<!-- ANALYTICS -->

<div class="analytics">

<div class="statCard">
<div class="statTitle">Total Codes</div>
<div class="statNumber" id="totalCodes">0</div>
</div>

<div class="statCard">
<div class="statTitle">Students Activated</div>
<div class="statNumber" id="usedCodes">0</div>
</div>

<div class="statCard">
<div class="statTitle">Unused Codes</div>
<div class="statNumber" id="unusedCodes">0</div>
</div>

</div>

<!-- CHART -->

<div class="card">
<h3>Activation Chart</h3>
<canvas id="activationChart"></canvas>
</div>

<!-- GENERATOR -->

<div class="card">

<div class="buttons">
<button onclick="generateCode()">Generate 1 Code</button>
<button onclick="generateTenCodes()">Generate 10 Codes</button>
<button onclick="copyCodes()">Copy Generated</button>
<button onclick="exportCSV()">Export CSV</button>
<button class="danger" onclick="deleteUsed()">Delete Used Codes</button>
</div>

<div class="codeBox" id="codeDisplay">
No code generated
</div>

</div>

<!-- TABLE -->

<div class="card">

<h3>All Access Codes</h3>

<div class="tableWrap">

<table>

<thead>
<tr>
<th>Code</th>
<th>Status</th>
<th>Device</th>
<th>Activated</th>
</tr>
</thead>

<tbody id="codesTable"></tbody>

</table>

</div>

<div class="pagination" id="pagination">

<button onclick="prevPage()">Previous</button>

<span id="pageInfo">Page 1</span>

<button onclick="nextPage()">Next</button>

</div>

</div>

</div>

<div class="toast" id="toast">Copied!</div>

<script>

/* ADMIN LOGIN */

const adminPassword="mike.com37406582"

function loginAdmin(){

const input=document.getElementById("adminPass").value

if(input===adminPassword){

localStorage.setItem("adminAccess","granted")
document.getElementById("loginScreen").style.display="none"

}else{

document.getElementById("loginError").style.display="block"

}

}

if(localStorage.getItem("adminAccess")==="granted"){
document.getElementById("loginScreen").style.display="none"
}

</script>

<script type="module">

import { db } from "./firebase.js";

import {
doc,
setDoc,
collection,
getDocs,
deleteDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let generatedCodes=[]
let allCodes=[]
let currentPage=1
const rowsPerPage=10
const paginationStart=20
let chart

function createRandomCode(){

const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"

let code="FLYER-"

for(let i=0;i<6;i++){
code+=chars.charAt(Math.floor(Math.random()*chars.length))
}

return code

}

function showToast(){

const toast=document.getElementById("toast")

toast.classList.add("show")

setTimeout(()=>{
toast.classList.remove("show")
},2000)

}

function copyText(text){
navigator.clipboard.writeText(text)
showToast()
}

/* GENERATE */

window.generateCode=async function(){

let code=createRandomCode()

await setDoc(doc(db,"accessCodes",code),{
used:false,
deviceId:"",
activatedAt:"",
created:serverTimestamp()
})

generatedCodes=[code]

document.getElementById("codeDisplay").innerText=code

loadCodes()

}

window.generateTenCodes=async function(){

generatedCodes=[]
let list=""

for(let i=0;i<10;i++){

let code=createRandomCode()

await setDoc(doc(db,"accessCodes",code),{
used:false,
deviceId:"",
activatedAt:"",
created:serverTimestamp()
})

generatedCodes.push(code)
list+=code+"\n"

}

document.getElementById("codeDisplay").innerText=list

loadCodes()

}

window.copyCodes=function(){

if(generatedCodes.length===0){
alert("No generated codes")
return
}

navigator.clipboard.writeText(generatedCodes.join("\n"))
showToast()

}

/* EXPORT CSV */

window.exportCSV=async function(){

const snapshot=await getDocs(collection(db,"accessCodes"))

let csv="Code,Used,Device,Activated\n"

snapshot.forEach(docItem=>{

const d=docItem.data()

csv+=`${docItem.id},${d.used},${d.deviceId||""},${d.activatedAt||""}\n`

})

const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"})

const link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="course_codes.csv"

document.body.appendChild(link)
link.click()
document.body.removeChild(link)

}

/* DELETE USED */

window.deleteUsed=async function(){

if(!confirm("Delete all used codes?")) return

const snapshot=await getDocs(collection(db,"accessCodes"))

for(const docItem of snapshot.docs){

const data=docItem.data()

if(data.used){
await deleteDoc(doc(db,"accessCodes",docItem.id))
}

}

loadCodes()

}

/* TABLE */

function renderTable(){

const table=document.getElementById("codesTable")
const pagination=document.getElementById("pagination")

table.innerHTML=""

if(allCodes.length<=paginationStart){

pagination.style.display="none"

allCodes.forEach(item=>{

let status=item.used
? '<span class="used">Used</span>'
: '<span class="unused">Unused</span>'

table.innerHTML+=`

<tr>
<td class="codeCell" onclick="copyText('${item.id}')">${item.id}</td>
<td>${status}</td>
<td>${item.deviceId||"-"}</td>
<td>${item.activatedAt||"-"}</td>
</tr>
`

})

return

}

pagination.style.display="flex"

let start=(currentPage-1)*rowsPerPage
let end=start+rowsPerPage

let pageData=allCodes.slice(start,end)

pageData.forEach(item=>{

let status=item.used
? '<span class="used">Used</span>'
: '<span class="unused">Unused</span>'

table.innerHTML+=`

<tr>
<td class="codeCell" onclick="copyText('${item.id}')">${item.id}</td>
<td>${status}</td>
<td>${item.deviceId||"-"}</td>
<td>${item.activatedAt||"-"}</td>
</tr>
`

})

document.getElementById("pageInfo").innerText=`Page ${currentPage}`

}

window.nextPage=function(){

if(currentPage*rowsPerPage<allCodes.length){
currentPage++
renderTable()
}

}

window.prevPage=function(){

if(currentPage>1){
currentPage--
renderTable()
}

}

/* LOAD DATA */

async function loadCodes(){

const snapshot=await getDocs(collection(db,"accessCodes"))

allCodes=[]
currentPage=1

let total=0
let used=0
let unused=0

snapshot.forEach(docItem=>{

const data=docItem.data()

allCodes.push({id:docItem.id,...data})

total++

if(data.used) used++
else unused++

})

document.getElementById("totalCodes").innerText=total
document.getElementById("usedCodes").innerText=used
document.getElementById("unusedCodes").innerText=unused

renderTable()

const ctx=document.getElementById("activationChart")

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Activated","Unused"],
datasets:[{
data:[used,unused],
backgroundColor:["#22c55e","#f59e0b"]
}]
},
options:{
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true}}
}
})

}

window.copyText=copyText

loadCodes()

</script>

</body>
</html>
